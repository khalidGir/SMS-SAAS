volumes:
  postgres_data:
    driver: local
  backup_data:
    driver: local

services:

  # ===========================================================================
  # DATABASE — PostgreSQL 16 (Alpine)
  # ===========================================================================
  db:
    image: postgres:16-alpine
    container_name: sms-db
    restart: unless-stopped

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - backup_data:/backup

    environment:
      POSTGRES_USER: sms
      POSTGRES_PASSWORD: sms_secret_prod
      POSTGRES_DB: sms_production

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sms -d sms_production"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"

  # ===========================================================================
  # BACKEND — Express API (Port 4000)
  # ===========================================================================
  backend:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: sms-backend
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    environment:
      DATABASE_URL: "postgresql://sms:sms_secret_prod@db:5432/sms_production"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-too}
      PORT: "4000"
      NODE_ENV: production
      PRISMA_SEED: "false"

    ports:
      - "4000:4000"

    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M

  # ===========================================================================
  # FRONTEND — Next.js (Port 3000)
  # ===========================================================================
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: sms-frontend
    restart: unless-stopped

    depends_on:
      - backend

    environment:
      API_PROXY_URL: "http://backend:4000"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"

    ports:
      - "3000:3000"

    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
